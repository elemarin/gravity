<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0010" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg:         #06000d;
        --text:       #e8f4ff;
        --text-dim:   #8aa0b5;
        --cyan:       #00e5ff;
        --orange:     #ff8a3d;
        --green:      #2ee59d;
        --yellow:     #ffd54a;
        --red:        #ff5577;
        --purple:     #b070ff;
        --panel-bg:   rgba(10, 16, 28, 0.55);
        --panel-bd:   rgba(255, 255, 255, 0.10);
        --panel-bd-hi:rgba(255, 255, 255, 0.18);
        --shadow:     0 4px 20px rgba(0, 0, 0, 0.4);
        --safe-top:   env(safe-area-inset-top, 0px);
        --safe-bot:   env(safe-area-inset-bottom, 0px);
        --safe-left:  env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family: 'Orbitron', system-ui, -apple-system, sans-serif;
        color: var(--text);
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: none;
      }

      #canvas-container { position: fixed; inset: 0; z-index: 0; }
      canvas { display: block; width: 100% !important; height: 100% !important; }

      #hud {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      /* ============ TOP BAR ============ */
      #top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding:
          calc(12px + var(--safe-top))
          calc(16px + var(--safe-right))
          0
          calc(16px + var(--safe-left));
      }

      .stat-pill {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-bd);
        border-radius: 999px;
        padding: 10px 16px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: var(--shadow);
        min-width: 0;
      }

      .stat-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--text-dim);
        text-transform: uppercase;
        line-height: 1;
      }

      .stat-value {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
      }

      .stat-stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .stat-icon {
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }

      #stat-altitude .stat-icon { color: var(--cyan); }
      #stat-velocity .stat-icon { color: var(--orange); }

      .phase-badge {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.18em;
        padding: 8px 14px;
        border-radius: 8px;
        border: 1.5px solid;
        background: var(--panel-bg);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        text-transform: uppercase;
        box-shadow: var(--shadow);
        transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
        white-space: nowrap;
      }

      /* ============ FUEL BAR ============ */
      #fuel-strip {
        position: absolute;
        top: calc(74px + var(--safe-top));
        left: calc(16px + var(--safe-left));
        right: calc(16px + var(--safe-right));
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #fuel-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--text-dim);
        text-transform: uppercase;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
        min-width: 70px;
      }

      #fuel-bar-track {
        flex: 1;
        height: 6px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--panel-bd);
        border-radius: 999px;
        overflow: hidden;
        backdrop-filter: blur(4px);
      }

      #fuel-bar-fill {
        height: 100%;
        width: 100%;
        background: var(--green);
        border-radius: 999px;
        transition: width 0.15s ease, background 0.3s;
        box-shadow: 0 0 8px currentColor;
      }

      /* ============ NEXT TARGET ============ */
      #next-target {
        position: absolute;
        bottom: calc(180px + var(--safe-bot));
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel-bg);
        border: 1px solid var(--panel-bd);
        border-radius: 999px;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: var(--shadow);
        max-width: calc(100vw - 32px);
      }

      #target-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: var(--yellow);
        text-transform: uppercase;
        flex-shrink: 0;
      }

      #target-text {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ============ MILESTONE TOAST ============ */
      #toast {
        position: absolute;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -20px);
        opacity: 0;
        pointer-events: none;
        background: linear-gradient(135deg, rgba(20, 14, 40, 0.95), rgba(40, 24, 70, 0.95));
        border: 2px solid var(--yellow);
        border-radius: 16px;
        padding: 18px 28px;
        text-align: center;
        box-shadow:
          0 0 0 4px rgba(255, 213, 74, 0.1),
          0 8px 40px rgba(255, 213, 74, 0.3);
        backdrop-filter: blur(12px);
        max-width: 320px;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      #toast-icon {
        font-size: 32px;
        line-height: 1;
        margin-bottom: 8px;
      }

      #toast-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: var(--yellow);
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      #toast-text {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }

      /* ============ CONTROLS ============ */
      #controls {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: end;
        gap: 12px;
        padding:
          0
          calc(20px + var(--safe-right))
          calc(20px + var(--safe-bot))
          calc(20px + var(--safe-left));
        pointer-events: none;
      }

      #left-controls,
      #right-controls {
        display: flex;
        gap: 12px;
        pointer-events: all;
      }

      #right-controls { justify-content: flex-end; }

      #center-controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: all;
      }

      .ctrl-btn {
        font-family: inherit;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(255, 255, 255, 0.18);
        color: var(--text);
        border-radius: 50%;
        width: 64px;
        height: 64px;
        font-size: 22px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: var(--shadow);
        transition: transform 0.08s ease, background 0.15s, border-color 0.15s, box-shadow 0.15s;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        user-select: none;
        padding: 0;
      }

      .ctrl-btn:active,
      .ctrl-btn.held {
        transform: scale(0.92);
      }

      .ctrl-btn.held {
        background: rgba(255, 138, 61, 0.25);
        border-color: var(--orange);
        box-shadow: 0 0 16px rgba(255, 138, 61, 0.5);
        color: var(--orange);
      }

      .ctrl-btn.ctrl-throttle-up {
        width: 84px;
        height: 84px;
        font-size: 30px;
        background: rgba(255, 138, 61, 0.15);
        border-color: rgba(255, 138, 61, 0.5);
        color: var(--orange);
      }

      .ctrl-btn.ctrl-throttle-up.held {
        background: rgba(255, 138, 61, 0.45);
        box-shadow: 0 0 24px rgba(255, 138, 61, 0.7);
      }

      .ctrl-btn.ctrl-throttle-down {
        width: 52px;
        height: 52px;
        font-size: 18px;
      }

      .ctrl-btn.ctrl-reset {
        width: 44px;
        height: 44px;
        font-size: 16px;
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.12);
        color: var(--text-dim);
      }

      .ctrl-btn.ctrl-reset.held {
        background: rgba(255, 85, 119, 0.2);
        border-color: var(--red);
        color: var(--red);
        box-shadow: 0 0 16px rgba(255, 85, 119, 0.5);
      }

      /* ============ KEYBOARD HINT (desktop) ============ */
      #kbd-hint {
        position: absolute;
        bottom: calc(8px + var(--safe-bot));
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        letter-spacing: 0.18em;
        color: var(--text-dim);
        text-transform: uppercase;
        opacity: 0.6;
        white-space: nowrap;
        display: none;
      }

      /* ============ RESPONSIVE ============ */
      @media (min-width: 768px) {
        .stat-value { font-size: 18px; }
        .ctrl-btn { width: 56px; height: 56px; font-size: 20px; }
        .ctrl-btn.ctrl-throttle-up { width: 72px; height: 72px; font-size: 26px; }
        .ctrl-btn.ctrl-throttle-down { width: 48px; height: 48px; }
        #next-target { bottom: calc(170px + var(--safe-bot)); }
      }

      @media (hover: hover) and (pointer: fine) {
        #kbd-hint { display: block; }
      }

      @media (max-width: 380px) {
        .stat-pill { padding: 8px 12px; gap: 6px; }
        .stat-value { font-size: 14px; }
        .stat-label { font-size: 8px; }
        .phase-badge { font-size: 10px; padding: 6px 10px; letter-spacing: 0.12em; }
        .ctrl-btn { width: 56px; height: 56px; font-size: 20px; }
        .ctrl-btn.ctrl-throttle-up { width: 72px; height: 72px; font-size: 26px; }
        #left-controls, #right-controls { gap: 8px; }
      }

      /* Hide stat label on narrow screens but keep value */
      @media (max-width: 420px) {
        .stat-label { display: none; }
        .stat-pill { padding: 8px 12px; }
      }

      /* Landscape on phones: shrink controls a bit */
      @media (max-height: 500px) and (orientation: landscape) {
        .ctrl-btn { width: 52px; height: 52px; font-size: 18px; }
        .ctrl-btn.ctrl-throttle-up { width: 64px; height: 64px; font-size: 22px; }
        #controls { padding-bottom: calc(12px + var(--safe-bot)); }
        #next-target { bottom: calc(132px + var(--safe-bot)); }
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="hud">
      <!-- TOP BAR -->
      <div id="top-bar">
        <div class="stat-pill" id="stat-altitude">
          <div class="stat-icon">▲</div>
          <div class="stat-stack">
            <div class="stat-label">Altitude</div>
            <div class="stat-value" id="alt-value">0 m</div>
          </div>
        </div>

        <div class="phase-badge" id="phase-badge">PRE-LAUNCH</div>

        <div class="stat-pill" id="stat-velocity">
          <div class="stat-stack" style="text-align: right;">
            <div class="stat-label">Velocity</div>
            <div class="stat-value" id="vel-value">0 m/s</div>
          </div>
          <div class="stat-icon">⚡</div>
        </div>
      </div>

      <!-- FUEL STRIP -->
      <div id="fuel-strip">
        <div id="fuel-label">Fuel 100%</div>
        <div id="fuel-bar-track"><div id="fuel-bar-fill"></div></div>
      </div>

      <!-- NEXT TARGET -->
      <div id="next-target">
        <span id="target-label">★ Target</span>
        <span id="target-text">Reach 500 m altitude</span>
      </div>

      <!-- MILESTONE TOAST -->
      <div id="toast">
        <div id="toast-icon">🏆</div>
        <div id="toast-title">Milestone</div>
        <div id="toast-text"></div>
      </div>

      <!-- BOTTOM CONTROLS -->
      <div id="controls">
        <div id="left-controls">
          <button class="ctrl-btn" id="btn-rotate-left" aria-label="Rotate Left">◀</button>
        </div>
        <div id="center-controls">
          <button class="ctrl-btn ctrl-throttle-up"   id="btn-throttle-up"   aria-label="Throttle Up">▲</button>
          <button class="ctrl-btn ctrl-throttle-down" id="btn-throttle-down" aria-label="Throttle Down">▼</button>
          <button class="ctrl-btn ctrl-reset"         id="btn-reset"         aria-label="Reset">↺</button>
        </div>
        <div id="right-controls">
          <button class="ctrl-btn" id="btn-rotate-right" aria-label="Rotate Right">▶</button>
        </div>
      </div>

      <div id="kbd-hint">W/SPACE throttle · S brake · A/D rotate · R reset</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
